<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ssewss0</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #2a003f, #000);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        text-align: center;
        z-index: 2;
    }

    h1 {
        margin-bottom: 25px;
        font-size: 42px;
        color: #d28bff;
        text-shadow: 0 0 15px rgba(210, 139, 255, 0.8);
    }

    .btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin: 14px auto;
        width: 220px;
        height: 58px;
        border: none;
        border-radius: 16px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        color: white;
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(8px);
        box-shadow: 0 0 12px rgba(162, 0, 255, 0.4);
        transition: 0.3s;
    }

    .btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 18px rgba(200, 0, 255, 0.8);
    }

    .btn img {
        width: 24px;
        height: 24px;
    }

    canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 1;
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">
    <h1>ssewss0</h1>

    <button class="btn" onclick="openLink('https://github.com/caavo0')">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png">
        GitHub
    </button>

    <button class="btn" onclick="openLink('https://www.tiktok.com/@takossbatos')">
        <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
        TikTok
    </button>

    <button class="btn" onclick="openLink('https://www.youtube.com/@ssewss0')">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
        YouTube
    </button>

    <button class="btn" onclick="openLink('https://discord.com/users/ssewss0')">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
        Discord
    </button>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

document.addEventListener("click", () => {
    if (audioCtx.state === "suspended") {
        audioCtx.resume();
    }
});

function playClickSound() {
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = "square";
    oscillator.frequency.setValueAtTime(650, audioCtx.currentTime);

    gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + 0.08
    );

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start(audioCtx.currentTime);
    oscillator.stop(audioCtx.currentTime + 0.08);
}

function openLink(url) {
    playClickSound();
    setTimeout(() => {
        window.open(url, "_blank");
    }, 100);
}

document.addEventListener("click", playClickSound);

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedY = Math.random() * 1 + 0.3;
        this.alpha = Math.random() * 0.7 + 0.2;
    }

    update() {
        this.y += this.speedY;

        if (this.y > canvas.height) {
            this.y = 0;
            this.x = Math.random() * canvas.width;
        }
    }

    draw() {
        ctx.fillStyle = `rgba(180, 0, 255, ${this.alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

for (let i = 0; i < 120; i++) {
    particles.push(new Particle());
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
